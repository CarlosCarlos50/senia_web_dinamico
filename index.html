<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeñIA - Intérprete Dinámico</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-color: #0b2926;
            --primary: #2de0d4;
            --primary-glow: rgba(45,224,212,0.4);
            --text-main: #fff;
            --card-bg: #113b37;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #resultado {
            font-size: 2rem;
            font-weight: bold;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid var(--primary);
            margin: 20px;
            text-align: center;
            min-width: 200px;
        }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            height: 480px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--card-bg);
            margin: 20px auto;
        }
        video, .output_canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        video { transform: scaleX(-1); }
        .output_canvas { pointer-events: none; display: none; }
        .controles {
            display: flex;
            gap: 15px;
            margin: 20px;
        }
        .btn {
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            background: var(--primary);
            color: var(--bg-color);
        }
    </style>
</head>
<body>
    <h1>SeñIA Intérprete Dinámico</h1>
    <div class="controles">
        <button id="togglePuntos" class="btn">🔘 Mostrar Puntos</button>
        <button id="toggleCamara" class="btn">📷 Cambiar Cámara</button>
    </div>
    <div id="resultado">HAZ CLIC PARA INICIAR</div>
    <div class="video-container">
        <video class="input_video"></video>
        <canvas class="output_canvas"></canvas>
    </div>
    <p class="instrucciones">• Haz clic para activar la cámara<br>• Muestra una seña durante 1.5 segundos</p>

    <script>
        // ==================== CONFIGURACIÓN ====================
        const API_URL = "https://senia-api-dinamico.onrender.com"; // Cambia a tu URL de producción
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const resultadoDiv = document.getElementById('resultado');
        const ctx = canvasElement.getContext('2d');

        let mostrarPuntos = false;
        let camaraFrontal = true;
        let cameraInstance = null;
        let handsInstance = null;
        let sistemaIniciado = false;

        // Buffer para la secuencia dinámica
        let bufferSecuencia = [];
        let ultimoEnvio = 0;
        const INTERVALO_ENVIO = 1500; // 1.5 segundos entre envíos

        // ==================== DIBUJO DE PUNTOS ====================
        const CONEXIONES = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]];
        function dibujarLandmarks(landmarks) {
            if (!landmarks) return;
            ctx.save();
            ctx.scale(-1,1);
            ctx.translate(-canvasElement.width, 0);
            ctx.strokeStyle = '#2de0d4';
            ctx.fillStyle = '#fff';
            ctx.lineWidth = 3;
            CONEXIONES.forEach(([i,j]) => {
                const p1 = landmarks[i], p2 = landmarks[j];
                ctx.beginPath();
                ctx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
                ctx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
                ctx.stroke();
            });
            landmarks.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x * canvasElement.width, p.y * canvasElement.height, 4, 0, 2*Math.PI);
                ctx.fill();
            });
            ctx.restore();
        }
        function limpiarCanvas() { ctx.clearRect(0,0,canvasElement.width,canvasElement.height); }

        // ==================== CONTROL DE PUNTOS Y CÁMARA ====================
        function togglePuntos() {
            mostrarPuntos = !mostrarPuntos;
            const btn = document.getElementById('togglePuntos');
            if (mostrarPuntos) {
                btn.textContent = '🔘 Ocultar Puntos';
                canvasElement.style.display = 'block';
            } else {
                btn.textContent = '🔘 Mostrar Puntos';
                canvasElement.style.display = 'none';
                limpiarCanvas();
            }
        }
        async function cambiarCamara() {
            if (!cameraInstance) return;
            await cameraInstance.stop();
            camaraFrontal = !camaraFrontal;
            cameraInstance = new Camera(videoElement, {
                onFrame: async () => await handsInstance.send({ image: videoElement }),
                width: 640, height: 480,
                facingMode: camaraFrontal ? 'user' : 'environment'
            });
            await cameraInstance.start();
            document.getElementById('toggleCamara').innerHTML = camaraFrontal ? '📷 Cámara Trasera' : '📷 Cámara Frontal';
        }

        // ==================== ENVÍO DE SECUENCIA DINÁMICA ====================
        async function enviarSecuencia() {
            if (bufferSecuencia.length < 10) return; // muy corto
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ frames: bufferSecuencia })
                });
                const data = await response.json();
                if (data.seña && data.confianza > 50) {
                    resultadoDiv.innerText = data.seña;
                } else {
                    resultadoDiv.innerText = "No reconocido";
                }
            } catch (error) {
                console.error('Error en dinámico:', error);
                resultadoDiv.innerText = "Error API";
            }
            bufferSecuencia = [];
        }

        // ==================== INICIALIZACIÓN MEDIAPIPE ====================
        async function iniciarSistema() {
            if (sistemaIniciado) return;
            try {
                sistemaIniciado = true;
                resultadoDiv.innerText = "Iniciando...";
                handsInstance = new Hands({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                });
                handsInstance.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 0,
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });

                handsInstance.onResults((results) => {
                    ctx.save();
                    ctx.clearRect(0,0,canvasElement.width,canvasElement.height);
                    const ahora = Date.now();

                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        const landmarks = results.multiHandLandmarks[0];
                        if (mostrarPuntos) dibujarLandmarks(landmarks);

                        // Extraer puntos y agregar al buffer
                        const puntos = [];
                        landmarks.forEach(p => puntos.push(p.x, p.y, p.z));
                        bufferSecuencia.push(puntos);

                        // Cada INTERVALO_ENVIO ms, enviamos la secuencia
                        if (ahora - ultimoEnvio > INTERVALO_ENVIO && bufferSecuencia.length > 5) {
                            ultimoEnvio = ahora;
                            enviarSecuencia();
                        }
                    } else {
                        // Si no hay mano, limpiamos buffer después de un tiempo? opcional
                        resultadoDiv.innerText = "✋ Muestra tu mano";
                    }
                    ctx.restore();
                });

                cameraInstance = new Camera(videoElement, {
                    onFrame: async () => await handsInstance.send({ image: videoElement }),
                    width: 640, height: 480,
                    facingMode: 'user'
                });
                await cameraInstance.start();
                resultadoDiv.innerText = "✅ ¡Listo! Muestra tu mano";

                // Configurar botones
                document.getElementById('togglePuntos').addEventListener('click', togglePuntos);
                document.getElementById('toggleCamara').addEventListener('click', cambiarCamara);
                // Iniciar el temporizador de envío periódico
                setInterval(() => {
                    if (bufferSecuencia.length > 5 && Date.now() - ultimoEnvio > INTERVALO_ENVIO) {
                        ultimoEnvio = Date.now();
                        enviarSecuencia();
                    }
                }, 500); // revisamos cada medio segundo

                console.log("Sistema iniciado");
            } catch (error) {
                console.error(error);
                resultadoDiv.innerText = "❌ Error al iniciar";
                sistemaIniciado = false;
            }
        }

        document.addEventListener('click', () => { if (!sistemaIniciado) iniciarSistema(); }, { once: true });
    </script>
</body>
</html>
